<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LuckyBid — Live Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:transparent;font-family:'Rajdhani',sans-serif;color:#dde3f0;width:100%;height:100%;overflow:hidden}

.board{width:440px;margin:0 auto;display:flex;flex-direction:column;gap:10px;padding:20px}

.badge{border-radius:10px;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;letter-spacing:2px;backdrop-filter:blur(8px)}
.badge-nomin{background:#0d111799;border:2px solid #ffd600;color:#ffd600;justify-content:center;gap:10px}
.badge-snipe{background:#0d111799;border:2px solid #1d2235;color:#dde3f0}
.badge-snipe .val{background:#fe2c55;color:#fff;border-radius:6px;padding:3px 12px;font-size:14px}
.badge-vouch{background:rgba(124,77,255,.12);border:2px solid #7c4dff;color:#7c4dff}
.badge-vouch .val{background:#7c4dff;color:#fff;border-radius:6px;padding:3px 12px;font-size:14px}

.clock-card{background:#0d1117ee;border:1px solid #1d2235;border-radius:16px;overflow:hidden;backdrop-filter:blur(12px)}
.clock-top{background:rgba(0,0,0,.5);padding:12px 20px;text-align:center;border-bottom:1px solid #1d2235}
.brand{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;color:#4a5568}
.brand-title{font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:6px;color:#dde3f0;margin-top:2px}

#main-timer{font-family:'Orbitron',sans-serif;font-size:86px;font-weight:900;text-align:center;padding:28px 0 18px;color:#fff;text-shadow:0 0 50px rgba(0,229,255,.35);line-height:1;transition:color .3s}
#main-timer.warning{color:#ffd600;text-shadow:0 0 40px rgba(255,214,0,.5)}
#main-timer.danger{color:#ff1744;text-shadow:0 0 50px rgba(255,23,68,.7);animation:blink .5s infinite}
@keyframes blink{50%{opacity:.25}}

#snipe-flash{display:none;background:linear-gradient(90deg,rgba(254,44,85,.15),rgba(254,44,85,.05));border:1px solid #fe2c55;border-radius:8px;margin:0 16px;padding:9px;text-align:center;font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;color:#fe2c55;animation:pb 1s infinite}
@keyframes pb{50%{border-color:transparent}}

#waiting-area{min-height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
#waiting-text{font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:4px;color:#4a5568;text-align:center;animation:breathe 2s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.4}50%{opacity:1}}

#winner-display{display:none;flex-direction:column;align-items:center;gap:8px;animation:winIn .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes winIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.win-crown{font-size:40px;animation:bounce 1s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
.win-label{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:4px;color:#ffd600}
.win-name{font-family:'Orbitron',sans-serif;font-size:30px;font-weight:900;color:#fff;text-shadow:0 0 20px rgba(255,214,0,.4)}
.win-coins{color:#ffd600;font-size:15px;font-weight:700}

#bid-feed{max-height:140px;overflow:hidden;padding:0 16px 14px;display:flex;flex-direction:column;gap:5px}
.bid-item{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.03);border-radius:6px;padding:7px 10px;font-size:13px;animation:bidIn .35s ease}
.bid-item.newest{background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.18)}
@keyframes bidIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.b-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.b-src{font-size:9px;padding:2px 5px;border-radius:3px;opacity:.8}
.src-tiktok{background:rgba(254,44,85,.15);color:#fe2c55}
.src-manual{background:rgba(0,229,255,.1);color:#00e5ff}
.b-coins{color:#ffd600;font-weight:700;font-size:12px;margin-left:auto}

.clock-footer{padding:9px 20px;border-top:1px solid #1d2235;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#4a5568}
#footer-live{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;color:#00e5ff;display:flex;align-items:center;gap:5px}
#footer-live::before{content:'';width:6px;height:6px;border-radius:50%;background:#00e676;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.5)}}

.particle{position:fixed;pointer-events:none;animation:fu 1.1s ease forwards;z-index:999}
@keyframes fu{0%{opacity:1;transform:translateY(0)scale(1)}100%{opacity:0;transform:translateY(-90px)scale(1.6)}}
</style>
</head>
<body>
<div class="board">
  <div class="badge badge-nomin" id="badge-nomin">NO MINIMUM ✔</div>
  <div class="badge badge-snipe">
    <span>♦ SNIPE DELAY</span>
    <span class="val" id="snipe-val">25S</span>
  </div>
  <div class="badge badge-vouch">
    <span style="letter-spacing:3px">VOUCH</span>
    <span class="val" id="vouch-val">0</span>
  </div>
  <div class="clock-card">
    <div class="clock-top">
      <div class="brand">⬡ HypeCode Studio</div>
      <div class="brand-title">L U C K Y B I D</div>
    </div>
    <div id="main-timer">0:00</div>
    <div id="snipe-flash">⚡ SNIPE! TIME EXTENDED</div>
    <div id="waiting-area">
      <div id="waiting-text">WAITING FOR PLAYERS...</div>
      <div id="winner-display">
        <div class="win-crown">🏆</div>
        <div class="win-label">WINNER</div>
        <div class="win-name" id="win-name">—</div>
        <div class="win-coins" id="win-coins"></div>
      </div>
    </div>
    <div id="bid-feed"></div>
    <div class="clock-footer">
      <span>👥 <span id="total-count">0</span> participants</span>
      <span id="footer-live">LIVE</span>
    </div>
  </div>
</div>

<script>
let lastState=null, lastCount=0, lastRemaining=null;
const fmt=s=>{const m=Math.floor(s/60),sc=s%60;return m+':'+(sc<10?'0':'')+sc;};
const ini=n=>n?n.replace('@','')[0].toUpperCase():'?';

function apply(s){
  if(!s)return;

  const el=document.getElementById('main-timer');
  el.textContent=fmt(s.remaining||0);
  el.className='';
  if((s.remaining||0)<=10)el.classList.add('danger');
  else if((s.remaining||0)<=30)el.classList.add('warning');

  document.getElementById('snipe-val').textContent=(s.snipeDelay||25)+'S';

  // Badge: min bid
  const minBadge=document.getElementById('badge-nomin');
  minBadge.textContent=(s.minBid===0||s.minBid==null)?'NO MINIMUM ✔':'MIN BID: '+s.minBid+' 🪙';

  const pCount=s.participants?s.participants.length:0;
  document.getElementById('vouch-val').textContent=pCount;
  document.getElementById('total-count').textContent=pCount;

  // Snipe detection: time went UP while running
  if(lastRemaining!==null&&(s.remaining||0)>lastRemaining&&s.running){
    showSnipe();spawn('⚡');
  }
  lastRemaining=s.remaining||0;

  // Particle on new bid
  const nc=pCount;
  if(nc>lastCount&&s.participants&&s.participants.length>0){
    const newest=s.participants[s.participants.length-1];
    const c=newest.coins||0;
    spawn(c>=100?'💎':c>=50?'🌟':'🪙');
  }
  lastCount=nc;

  renderFeed(s.participants||[]);

  // Winner / waiting area
  const wt=document.getElementById('waiting-text');
  const wd=document.getElementById('winner-display');
  if(s.winner){
    wt.style.display='none';
    wd.style.display='flex';
    document.getElementById('win-name').textContent=s.winner.name||'—';
    document.getElementById('win-coins').textContent='🪙 '+(s.winner.coins||0)+' coins';
  } else if(pCount>0){
    wt.style.display='none';
    wd.style.display='none';
  } else {
    wt.style.display='block';
    wd.style.display='none';
  }

  // Confetti on new winner
  if(s.winner&&(!lastState||!lastState.winner)){
    const e=['🎉','🏆','⭐','🎊','💰','🪙','✨'];
    for(let i=0;i<14;i++)setTimeout(()=>spawn(e[Math.floor(Math.random()*e.length)]),i*90);
  }
  lastState=s;
}

function renderFeed(participants){
  const feed=document.getElementById('bid-feed');
  if(!participants||!participants.length){feed.innerHTML='';return;}
  const recent=[...participants].reverse().slice(0,5);
  feed.innerHTML=recent.map((p,i)=>`
    <div class="bid-item ${i===0?'newest':''}">
      <div class="b-av" style="background:${p.color||'#7c4dff'}22;color:${p.color||'#7c4dff'}">${ini(p.name)}</div>
      <span style="font-weight:600;flex:1">${p.name||'?'}</span>
      <span class="b-src src-${p.source==='tiktok'?'tiktok':'manual'}">${p.source||'manual'}</span>
      <span class="b-coins">🪙${p.coins||0}</span>
    </div>`).join('');
}

function showSnipe(){
  const el=document.getElementById('snipe-flash');
  el.style.display='block';
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.display='none',3500);
}

function spawn(emoji){
  const el=document.createElement('div');
  el.className='particle';
  el.textContent=emoji;
  el.style.left=(Math.random()*80+10)+'vw';
  el.style.top=(Math.random()*60+20)+'vh';
  el.style.fontSize=(18+Math.random()*18)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1200);
}

function poll(){
  try{
    const raw=localStorage.getItem('luckybid_state');
    if(raw){
      const parsed=JSON.parse(raw);
      apply(parsed);
    }
  }catch(e){}
}

// Poll every 250ms for smooth updates
setInterval(poll,250);
poll();
</script>
</body>
</html>
